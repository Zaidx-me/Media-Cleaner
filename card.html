<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Card Stack</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Space Mono', monospace; /* Monospace for the technical feel */
            overflow: hidden;
            background-color: #080808;
            /* Creates the subtle grid background */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Top Header UI */
        .header-ui {
            width: 320px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: #fff;
            z-index: 100;
        }

        .progress-indicator {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .circle-ring {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(92, 225, 230, 0.3);
            border-top-color: #5ce1e6; /* Glowing cyan edge */
            box-shadow: 0 0 10px rgba(92, 225, 230, 0.2);
        }

        .skip-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid #5ce1e6;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(92, 225, 230, 0.2);
        }

        /* Stack Container */
        .stack-container {
            position: relative;
            width: 340px;
            height: 220px; /* Wider and shorter to match the landscape card aspect ratio */
        }

        /* The Card */
        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0c0f12; /* Dark slate background */
            border: 2px solid #5ce1e6; /* Glowing Cyan Border */
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(92, 225, 230, 0.15), inset 0 0 15px rgba(92, 225, 230, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            box-sizing: border-box;
            user-select: none;
            cursor: grab;
            will-change: transform;
            transition: transform 0.3s ease-out;
            color: #e0e0e0;
        }

        .card:active {
            cursor: grabbing;
        }

        /* Inner Card Elements */
        .card-logo {
            font-weight: bold;
            font-size: 20px;
            letter-spacing: -2px;
            color: #5ce1e6;
            pointer-events: none;
        }

        .card-title {
            font-size: 24px;
            line-height: 1.3;
            font-weight: 400;
            margin: 0;
            pointer-events: none;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        .card-footer {
            font-size: 14px;
            color: #888;
            pointer-events: none;
        }

        .blink {
            animation: blinker 1s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Top UI matching the reference -->
    <div class="header-ui">
        <div class="progress-indicator">
            <div class="circle-ring"></div>
            <span id="counter-text">1 / 4</span>
        </div>
        <div class="skip-btn">>>|</div>
    </div>

    <!-- The interactive stack -->
    <div class="stack-container" id="stack-container">
        <!-- Cards generated by JS -->
    </div>

    <script>
        const container = document.getElementById('stack-container');
        const counterText = document.getElementById('counter-text');
        
        // Data for 4 identical cards based on your reference
        const totalCards = 4;
        const cardData = Array.from({ length: totalCards }).map(() => ({
            logo: "iF|M",
            title: "Designer Soul.<br>Developer Brain.",
            footer: "> READY TO EXECUTE <span class='blink'>_</span>"
        }));

        // 1. Build the stack (reverse order so index 0 is on top)
        cardData.reverse().forEach((data, index) => {
            const card = document.createElement('div');
            card.classList.add('card');
            
            card.innerHTML = `
                <div class="card-logo">${data.logo}</div>
                <h1 class="card-title">${data.title}</h1>
                <div class="card-footer">${data.footer}</div>
            `;
            
            container.appendChild(card);
        });

        const cards = document.querySelectorAll('.card');
        let topCardIndex = cards.length - 1; 
        let isDragging = false;
        let startX = 0;
        let currentX = 0;

        function updateStackVisuals() {
            let depthIndex = 0;
            for (let i = topCardIndex; i >= 0; i--) {
                const card = cards[i];
                // Offset logic for the stacked look
                const translateX = -(depthIndex * 15); // Offset to the left
                const translateY = depthIndex * 15;    // Offset downwards
                
                card.style.transition = 'transform 0.3s ease-out, opacity 0.3s';
                card.style.transform = `translate(${translateX}px, ${translateY}px)`;
                card.style.zIndex = topCardIndex - depthIndex;
                
                // Slightly fade out cards underneath
                card.style.opacity = 1 - (depthIndex * 0.2);
                depthIndex++;
            }
            
            // Update the counter UI
            const cardsRemaining = topCardIndex + 1;
            const currentDisplayNum = totalCards - cardsRemaining + 1;
            if (cardsRemaining > 0) {
                counterText.innerText = `${currentDisplayNum} / ${totalCards}`;
            } else {
                counterText.innerText = `Done`;
            }
        }

        function initSwipeEvents() {
            const topCard = cards[topCardIndex];
            if (!topCard) return; 

            topCard.addEventListener('pointerdown', handlePointerDown);
        }

        function handlePointerDown(e) {
            isDragging = true;
            startX = e.clientX;
            const topCard = cards[topCardIndex];
            
            topCard.style.transition = 'none'; 
            topCard.setPointerCapture(e.pointerId); 

            topCard.addEventListener('pointermove', handlePointerMove);
            topCard.addEventListener('pointerup', handlePointerUp);
            topCard.addEventListener('pointercancel', handlePointerUp);
        }

        function handlePointerMove(e) {
            if (!isDragging) return;
            currentX = e.clientX - startX;
            const topCard = cards[topCardIndex];
            
            const rotation = currentX * 0.03; 
            topCard.style.transform = `translate(${currentX}px, 0px) rotate(${rotation}deg)`;
        }

        function handlePointerUp(e) {
            if (!isDragging) return;
            isDragging = false;
            const topCard = cards[topCardIndex];

            topCard.removeEventListener('pointermove', handlePointerMove);
            topCard.removeEventListener('pointerup', handlePointerUp);
            topCard.removeEventListener('pointercancel', handlePointerUp);

            const swipeThreshold = 80;

            if (Math.abs(currentX) > swipeThreshold) {
                const direction = currentX > 0 ? 1 : -1;
                topCard.style.transition = 'transform 0.4s ease-out, opacity 0.4s';
                topCard.style.transform = `translate(${direction * window.innerWidth}px, 0px) rotate(${direction * 30}deg)`;
                topCard.style.opacity = '0';

                setTimeout(() => {
                    topCard.style.display = 'none';
                    topCardIndex--;
                    updateStackVisuals();
                    initSwipeEvents();
                }, 400);

            } else {
                updateStackVisuals(); // Snap back to natural stack position
            }
            
            currentX = 0; 
        }

        // Initialize
        updateStackVisuals();
        initSwipeEvents();
    </script>
</body>
</html>
